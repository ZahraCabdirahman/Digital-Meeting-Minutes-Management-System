services:
  backend:
    build:
      context: ./backend
    command: npm run dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 5000
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-123}
      DB_NAME: ${DB_NAME:-digital_meeting_minutes}
      JWT_SECRET: ${JWT_SECRET:-change_this_dev_secret_to_32_chars_minimum}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "${BACKEND_PUBLIC_PORT:-5001}:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_uploads:/app/uploads
 
  frontend:
    build:
      context: ./frontend
      target: build
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5001/api/v1}
    command: npm run dev -- --host 0.0.0.0
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5001/api/v1}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PUBLIC_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
 
volumes:
  backend_uploads:
 